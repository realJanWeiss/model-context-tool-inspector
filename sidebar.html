<html>
<head>
  <title>Tool Inspector</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <div id="chat-root">
    <div id="messages"></div>
    <div id="bottom">
      <div id="chips"></div>
      <form id="input-form">
        <textarea id="prompt-input" placeholder="Ask anything…" rows="1"></textarea>
        <button type="submit" id="send-btn" aria-label="Send">
          <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
            <path d="M10 3a.75.75 0 0 1 .75.75v10.19l3.22-3.22a.75.75 0 1 1 1.06 1.06l-4.5 4.5a.75.75 0 0 1-1.06 0l-4.5-4.5a.75.75 0 1 1 1.06-1.06l3.22 3.22V3.75A.75.75 0 0 1 10 3Z"
              transform="rotate(180,10,10)"/>
          </svg>
        </button>
      </form>
    </div>
  </div>
  <script type="module" src="chat.js"></script>
</body>
</html>
